substitutions:
  _IMAGE_FULL_PATH: asia-northeast1-docker.pkg.dev/singular-rope-268807/my-repo/my-go-app
  _ATTESTOR_ID: vulnz-attestor
  _KEY_LOCATION: global
  _KEYRING: binauthz-keys
  _KEY_NAME: codelab-key
  _KEY_VERSION: '1'

steps:

# build
- id: "build"
  name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '${_IMAGE_FULL_PATH}', '.']
  waitFor: ['-']

#Run a vulnerability scan at _SECURITY level
- id: scan
  name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    (gcloud artifacts docker images scan \
    '${_IMAGE_FULL_PATH}' \
    --location us \
    --format="value(response.scan)") > /workspace/scan_id.txt

#Analyze the result of the scan
- id: severity check
  name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
      gcloud artifacts docker images list-vulnerabilities $(cat /workspace/scan_id.txt) \
      --format="value(vulnerability.effectiveSeverity)" | if grep -Fxq CRITICAL; \
      then echo "Failed vulnerability check for CRITICAL level" && exit 1; else echo "No CRITICAL vulnerability found, congrats !" && exit 0; fi

#Retag
- id: "retag"
  name: 'gcr.io/cloud-builders/docker'
  args: ['tag',  '${_IMAGE_FULL_PATH}', '${_IMAGE_FULL_PATH}:good']


#pushing to artifact registry
- id: "push"
  name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_IMAGE_FULL_PATH}:good']
  
#Sign the image only if the previous severity check passes
- id: 'create-attestation'
  name: 'gcr.io/${PROJECT_ID}/binauthz-attestation:latest'
  args:
    - '--artifact-url'
    - '${_IMAGE_FULL_PATH}:good'
    - '--attestor'
    - 'projects/${PROJECT_ID}/attestors/${_ATTESTOR_ID}'
    - '--keyversion'
    - 'projects/${PROJECT_ID}/locations/${_KEY_LOCATION}/keyRings/${_KEYRING}/cryptoKeys/${_KEY_NAME}/cryptoKeyVersions/${_KEY_VERSION}'

- id: 'kubectl-apply'
  name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'k8s-deploy.yaml']

images:
  - '${_IMAGE_FULL_PATH}'

options:
  logging: CLOUD_LOGGING_ONLY